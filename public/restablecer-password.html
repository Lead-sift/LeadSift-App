<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Restablecer contraseña — LeadSift</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 380px; margin: 4rem auto; padding: 0 1.5rem; }
  h1 { font-size: 1.3rem; }
  label { display: block; font-weight: 600; margin: 1rem 0 0.3rem; }
  input { width: 100%; padding: 0.6rem; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; box-sizing: border-box; }
  .campo-password { position: relative; }
  .campo-password input { padding-right: 2.5rem; }
  .toggle-password { position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 0.85rem; color: #666; }
  button.principal { margin-top: 1.5rem; width: 100%; padding: 0.7rem; background: #1a4d8f; color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
  #mensaje { margin-top: 0.75rem; font-size: 0.9rem; }
  #error { color: #c0392b; font-size: 0.9rem; margin-top: 0.75rem; }
</style>
</head>
<body>
  <h1>Elige una nueva contraseña</h1>

  <div id="sin-token" style="display:none;">
    <p>Este enlace no es válido. Solicita uno nuevo desde <a href="/olvide-password.html">recuperar contraseña</a>.</p>
  </div>

  <form id="form-restablecer">
    <label for="password">Nueva contraseña</label>
    <div class="campo-password">
      <input id="password" type="password" minlength="8" required autocomplete="new-password" />
      <button type="button" class="toggle-password" onclick="alternarVisibilidad()">Ver</button>
    </div>
    <button type="submit" class="principal">Guardar nueva contraseña</button>
  </form>
  <p id="mensaje"></p>
  <p id="error"></p>

  <script>
    function alternarVisibilidad() {
      const campo = document.getElementById('password');
      const boton = document.querySelector('.toggle-password');
      const esTexto = campo.type === 'text';
      campo.type = esTexto ? 'password' : 'text';
      boton.textContent = esTexto ? 'Ver' : 'Ocultar';
    }

    // Supabase redirige aquí con el token de recuperación en el fragmento
    // de la URL (#access_token=...&refresh_token=...), no como query normal.
    const parametros = new URLSearchParams(window.location.hash.replace('#', '?'));
    const accessToken = parametros.get('access_token');
    const refreshToken = parametros.get('refresh_token');

    if (!accessToken || !refreshToken) {
      document.getElementById('sin-token').style.display = 'block';
      document.getElementById('form-restablecer').style.display = 'none';
    }

    document.getElementById('form-restablecer').addEventListener('submit', async (evento) => {
      evento.preventDefault();
      const nuevaContrasena = document.getElementById('password').value;
      const mensaje = document.getElementById('mensaje');
      const error = document.getElementById('error');
      error.textContent = '';
      mensaje.textContent = 'Guardando...';

      const res = await fetch('/api/auth/restablecer', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ accessToken, refreshToken, nuevaContrasena }),
      });
      const datos = await res.json();

      if (!res.ok) {
        mensaje.textContent = '';
        error.textContent = datos.error || 'No se pudo cambiar la contraseña';
        return;
      }

      mensaje.textContent = 'Contraseña actualizada. Ya puedes iniciar sesión.';
      setTimeout(() => (window.location.href = '/login.html'), 1500);
    });
  </script>
</body>
</html>
