<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Recuperar contraseña — LeadSift</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 380px; margin: 4rem auto; padding: 0 1.5rem; }
  h1 { font-size: 1.3rem; }
  p.aviso { font-size: 0.9rem; color: #666; }
  label { display: block; font-weight: 600; margin: 1rem 0 0.3rem; }
  input { width: 100%; padding: 0.6rem; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; box-sizing: border-box; }
  button { margin-top: 1.5rem; width: 100%; padding: 0.7rem; background: #1a4d8f; color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
  #mensaje { margin-top: 0.75rem; font-size: 0.9rem; }
  a { display: inline-block; margin-top: 1rem; font-size: 0.85rem; color: #1a4d8f; }
</style>
</head>
<body>
  <h1>Recuperar contraseña</h1>
  <p class="aviso">Introduce tu email y, si tiene una cuenta asociada, te enviaremos un enlace para restablecer la contraseña.</p>

  <form id="form-recuperar">
    <label for="email">Email</label>
    <input id="email" type="email" required />
    <button type="submit">Enviar enlace</button>
  </form>
  <p id="mensaje"></p>
  <a href="/login.html">← Volver al login</a>

  <script>
    document.getElementById('form-recuperar').addEventListener('submit', async (evento) => {
      evento.preventDefault();
      const email = document.getElementById('email').value.trim();
      const mensaje = document.getElementById('mensaje');
      mensaje.textContent = 'Enviando...';

      await fetch('/api/auth/solicitar-recuperacion', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });

      mensaje.textContent = 'Si el email existe, recibirás un enlace en unos minutos.';
    });
  </script>
</body>
</html>
