<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>LeadSift — Panel</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 96 96'%3E%3Crect width='96' height='96' rx='22' fill='%23B54A2C'/%3E%3Cpolygon points='24,20 72,20 67,30 29,30' fill='%23F0C5AE'/%3E%3Cpolygon points='30,31 66,31 61,41 35,41' fill='%23D98F72'/%3E%3Cpolygon points='36,42 60,42 55,52 41,52' fill='%237A2F19'/%3E%3Cpolygon points='41,52 55,52 48,64' fill='%23FBF6EE'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Work+Sans:wght@400;500;600&display=swap">
<style>
  :root {
    --arcilla: #B54A2C; --arcilla-oscuro: #7A2F19; --ciruela: #4A2545;
    --crema: #FBF6EE; --texto: #2B2620; --gris: #7A6B5C; --borde: #eaded0;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Work Sans', system-ui, sans-serif; color: var(--texto); background: var(--crema); }
  h1, h2, h3 { font-family: 'Poppins', sans-serif; }

  .app-shell { display: flex; min-height: 100vh; }

  .sidebar { width: 230px; background: white; border-right: 1px solid var(--borde); padding: 1.25rem 1rem; flex-shrink: 0; display: flex; flex-direction: column; }
  .marca-lockup { display: flex; align-items: center; gap: 8px; margin-bottom: 2rem; padding: 0 0.25rem; }
  .marca-lockup svg { width: 26px; height: 26px; }
  .marca-lockup span { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 1.15rem; }
  .marca-lockup span em { color: var(--arcilla); font-style: normal; }

  .titulo-grupo { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--gris); margin: 1.25rem 0 0.4rem 0.25rem; }
  .enlace-nav { display: block; padding: 0.55rem 0.6rem; border-radius: 6px; color: var(--texto); text-decoration: none; font-size: 0.92rem; cursor: pointer; }
  .enlace-nav:hover { background: #f4ede4; }
  .enlace-nav.activo { background: var(--arcilla); color: white; }

  .salir-btn { margin-top: auto; background: none; border: 1px solid var(--borde); border-radius: 6px; padding: 0.5rem; cursor: pointer; color: var(--gris); font-size: 0.85rem; }

  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .topbar { background: white; border-bottom: 1px solid var(--borde); padding: 0.85rem 1.5rem; display: flex; gap: 0.6rem; align-items: center; }
  .topbar input { flex: 1; max-width: 560px; padding: 0.55rem 0.8rem; border-radius: 20px; border: 1px solid var(--borde); font-size: 0.9rem; }
  .topbar button { background: var(--ciruela); color: white; border: none; border-radius: 20px; padding: 0.55rem 1.1rem; cursor: pointer; font-size: 0.85rem; }
  .topbar .icono-ia { font-size: 1.2rem; }

  .respuesta-asistente { background: #fff; border-bottom: 1px solid var(--borde); padding: 0.75rem 1.5rem; font-size: 0.9rem; display: none; white-space: pre-wrap; }

  .contenido { padding: 1.75rem; flex: 1; overflow-y: auto; }
  .contenido h2 { font-size: 1.3rem; margin-top: 0; }

  table { width: 100%; border-collapse: collapse; margin-top: 1rem; background: white; border-radius: 8px; overflow: hidden; }
  th, td { text-align: left; padding: 0.6rem 0.7rem; border-bottom: 1px solid var(--borde); font-size: 0.87rem; }
  th { background: #f4ede4; font-weight: 600; }
  tr.fila-clic { cursor: pointer; }
  tr.fila-clic:hover { background: #faf5ee; }

  .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 0.75rem; margin-top: 1rem; max-width: 700px; }
  .form-grid label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 0.25rem; color: var(--gris); }
  input, select, textarea { padding: 0.55rem; border: 1px solid var(--borde); border-radius: 6px; font-family: inherit; font-size: 0.9rem; width: 100%; }
  button.principal { padding: 0.55rem 1.1rem; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; background: var(--arcilla); color: white; }
  button.secundario { padding: 0.45rem 0.9rem; border: 1px solid var(--borde); border-radius: 6px; cursor: pointer; font-size: 0.85rem; background: white; }

  .panel-prompt { background: white; border: 1px solid var(--borde); border-radius: 8px; padding: 1.25rem; margin-top: 1rem; }
  .version-lista div.version { border-bottom: 1px solid var(--borde); padding: 0.6rem 0; font-size: 0.85rem; }
  .etiqueta-activo { background: #1a9f4d; color: white; font-size: 0.7rem; padding: 0.1rem 0.5rem; border-radius: 10px; margin-left: 0.4rem; }
  .etiqueta-entorno { background: #999; color: white; font-size: 0.7rem; padding: 0.1rem 0.5rem; border-radius: 10px; margin-left: 0.4rem; }
  .alerta { color: #c0392b; font-weight: bold; }

  .filtros { display: flex; gap: 0.6rem; margin: 1rem 0; flex-wrap: wrap; }
  .filtros select, .filtros input { width: auto; }

  .badge { display: inline-block; font-size: 0.72rem; padding: 0.15rem 0.55rem; border-radius: 10px; color: white; font-weight: 600; }
  .badge-en_curso { background: #2f7fd1; }
  .badge-congelado { background: #7A6B5C; }
  .badge-finalizado { background: #555; }
  .badge-confirmado { background: #1a9f4d; }
  .badge-desestimado { background: #c0392b; }
  .badge-spam { background: #999; }
  .badge-caliente { background: #c0392b; }
  .badge-templado { background: #d98f2c; }
  .badge-frio { background: #2f7fd1; }

  .panel-detalle-lead { background: white; border: 1px solid var(--borde); border-radius: 8px; padding: 1.25rem; margin-top: 1.25rem; }
  .panel-detalle-lead h3 { margin-top: 0; }
  .lead-campos { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 0.75rem; margin-bottom: 1rem; }
  .lead-campo strong { display: block; font-size: 0.75rem; color: var(--gris); text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 0.15rem; }
  .conversacion-caja { background: #f9f5ee; border: 1px solid var(--borde); border-radius: 6px; padding: 0.75rem; max-height: 320px; overflow-y: auto; margin-top: 0.4rem; }
  .msg-cliente { margin-bottom: 0.6rem; }
  .msg-cliente strong { color: var(--arcilla-oscuro); }
  .msg-ia strong { color: var(--ciruela); }

  .leads-layout { display: flex; gap: 1.25rem; align-items: flex-start; }
  .leads-tabla-col { flex: 1; min-width: 0; }
  .leads-detalle-col { flex: 0 0 0; width: 0; overflow: hidden; }
  .leads-layout.detalle-abierto .leads-tabla-col { flex: 0 0 auto; width: auto; }
  .leads-layout.detalle-abierto .leads-tabla-col .col-extra { display: none; }
  .leads-layout.detalle-abierto .leads-detalle-col { flex: 1 1 auto; width: auto; overflow: visible; }
  .leads-detalle-col .panel-detalle-lead { margin-top: 0; position: sticky; top: 1rem; }

  .paquetes-comparativa { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; align-items: stretch; }
  .paquete-columna { border: 2px solid var(--borde); border-radius: 10px; padding: 1.1rem; background: white; display: flex; flex-direction: column; }
  .paquete-columna.seleccionado { border-color: var(--arcilla); box-shadow: 0 0 0 2px rgba(181,74,44,0.15); }
  .paquete-columna h4 { margin: 0 0 0.25rem; font-size: 1.05rem; }
  .paquete-precio { font-size: 1.3rem; font-weight: 700; color: var(--arcilla-oscuro); margin: 0.4rem 0; }
  .paquete-precio small { font-size: 0.7rem; font-weight: 500; color: var(--gris); display: block; }
  .paquete-servicios { list-style: none; padding: 0; margin: 0.75rem 0; font-size: 0.85rem; flex: 1; }
  .paquete-servicios li { padding: 0.25rem 0; }
  .paquete-servicios li.no-incluido { color: var(--gris); text-decoration: line-through; }
  .etiqueta-paquete-actual { background: var(--arcilla); color: white; font-size: 0.72rem; padding: 0.2rem 0.6rem; border-radius: 10px; display: inline-block; margin-bottom: 0.5rem; }
</style>
</head>
<body>

<div class="app-shell">
  <aside class="sidebar">
    <div class="marca-lockup">
      <svg viewBox="0 0 96 96" aria-hidden="true">
        <polygon points="18,18 78,18 71,30 25,30" fill="#D98F72"/>
        <polygon points="25,31 71,31 64,43 32,43" fill="#B54A2C"/>
        <polygon points="32,44 64,44 57,56 39,56" fill="#7A2F19"/>
        <polygon points="39,56 57,56 48,73" fill="#4A2545"/>
      </svg>
      <span>Lead<em>Sift</em></span>
    </div>

    <nav>
      <div class="titulo-grupo">Producción</div>
      <a class="enlace-nav" data-vista="leads" onclick="irA('leads')">Leads</a>
      <a class="enlace-nav" data-vista="clientes" onclick="irA('clientes')">Listado de clientes</a>
      <a class="enlace-nav" data-vista="servicios" onclick="irA('servicios')">Servicios</a>
      <a class="enlace-nav" data-vista="nuevo-cliente" onclick="irA('nuevo-cliente')">Nuevo cliente</a>
      <a class="enlace-nav" data-vista="productos" onclick="irA('productos')">Productos</a>
      <a class="enlace-nav" data-vista="facturacion" onclick="irA('facturacion')">Facturación</a>

      <div class="titulo-grupo">Consultas</div>
      <a class="enlace-nav" data-vista="consultas" onclick="irA('consultas')">Consultas Generales</a>
      <a class="enlace-nav" data-vista="actividad" onclick="irA('actividad')">Actividad de los agentes</a>
      <a class="enlace-nav" data-vista="ficha-gestion" onclick="irA('ficha-gestion')">Ficha de Gestión</a>

      <div class="titulo-grupo">Mantenimiento</div>
      <a class="enlace-nav" data-vista="usuarios" onclick="irA('usuarios')">Usuarios / Roles</a>

      <div class="titulo-grupo">Estadísticas</div>
      <a class="enlace-nav" data-vista="dashboard" onclick="irA('dashboard')">Dashboard</a>
      <a class="enlace-nav" data-vista="extracciones" onclick="irA('extracciones')">Extracciones</a>
    </nav>

    <button class="salir-btn" onclick="salir()">Salir</button>
  </aside>

  <div class="main">
    <div class="topbar">
      <span class="icono-ia">✨</span>
      <input id="chat-pregunta-top" placeholder="Pregúntale al asistente… ej: ¿qué cliente ha consumido más tokens?" />
      <button onclick="preguntarAsistenteTop()">Preguntar</button>
    </div>
    <div class="respuesta-asistente" id="respuesta-asistente"></div>

    <div class="contenido" id="contenido"></div>
  </div>
</div>

<script>
  const token = localStorage.getItem('leadsift_token');
  if (!token) window.location.href = '/login.html';

  let empresaSeleccionada = null;

  async function api(ruta, opciones = {}) {
    const res = await fetch(ruta, {
      ...opciones,
      headers: {
        'Content-Type': 'application/json',
        Authorization: `Bearer ${token}`,
        ...(opciones.headers || {}),
      },
    });
    if (res.status === 401) {
      localStorage.removeItem('leadsift_token');
      window.location.href = '/login.html';
      return null;
    }
    return res.json();
  }

  function salir() {
    localStorage.removeItem('leadsift_token');
    window.location.href = '/login.html';
  }

  // --- Asistente en la barra superior ---
  async function preguntarAsistenteTop() {
    const input = document.getElementById('chat-pregunta-top');
    const pregunta = input.value.trim();
    if (!pregunta) return;
    const caja = document.getElementById('respuesta-asistente');
    caja.style.display = 'block';
    caja.textContent = 'Pensando...';
    const datos = await api('/api/admin/asistente', { method: 'POST', body: JSON.stringify({ pregunta }) });
    caja.textContent = datos.respuesta || datos.error || 'Sin respuesta';
    input.value = '';
  }
  document.getElementById('chat-pregunta-top').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') preguntarAsistenteTop();
  });

  // --- Navegación entre vistas ---
  const vistas = {
    consultas: renderConsultasGenerales,
    actividad: renderActividad,
    'ficha-gestion': renderFichaGestion,
    clientes: renderListadoClientes,
    'nuevo-cliente': renderNuevoCliente,
    servicios: renderServicios,
    leads: renderLeads,
    productos: renderProductos,
    facturacion: renderFacturacion,
    usuarios: renderUsuarios,
    dashboard: renderDashboard,
    extracciones: renderExtracciones,
  };

  let intervaloActividad = null;

  function irA(vista) {
    if (intervaloActividad) {
      clearInterval(intervaloActividad);
      intervaloActividad = null;
    }
    document.querySelectorAll('.enlace-nav').forEach((a) => a.classList.toggle('activo', a.dataset.vista === vista));
    window.location.hash = vista;
    vistas[vista]();
  }

  // --- Vista: Consultas Generales ---
  async function renderConsultasGenerales() {
    const contenido = document.getElementById('contenido');
    contenido.innerHTML = `
      <h2>Consultas Generales</h2>

      <h3>Buscar cliente o lead</h3>
      <p style="color:var(--gris); font-size:0.85rem; margin-top:-0.5rem;">Busca por cualquier campo: nombre, NIF/CIF, sector, contacto, teléfono, email, necesidad...</p>
      <div class="filtros">
        <input id="busqueda-general" placeholder="Buscar cliente o lead..." style="max-width:400px;" />
        <button class="secundario" onclick="buscarGeneral()">Buscar</button>
      </div>
      <div id="resultados-busqueda-general"></div>

      <h3 style="margin-top:2rem;">Todas las consultas</h3>
      <div class="filtros">
        <select id="filtro-canal"><option value="">Todos los canales</option><option value="email">Email</option><option value="formulario">Formulario</option><option value="whatsapp">WhatsApp</option></select>
        <select id="filtro-intencion"><option value="">Toda intención</option><option value="spam">Spam</option><option value="informativa">Informativa</option><option value="lead_potencial">Lead potencial</option><option value="consulta_disponibilidad">Consulta disponibilidad</option></select>
        <button class="secundario" onclick="cargarConsultasGenerales()">Filtrar</button>
      </div>
      <table id="tabla-consultas">
        <thead><tr><th>Fecha</th><th>Empresa</th><th>Canal</th><th>Intención</th><th>Contacto</th><th>Necesidad</th><th>Score</th></tr></thead>
        <tbody></tbody>
      </table>
    `;
    document.getElementById('busqueda-general').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') buscarGeneral();
    });
    cargarConsultasGenerales();
  }

  // --- Vista: Actividad de los agentes ---
  const ETIQUETAS_ETAPA = {
    clasificando: 'Clasificando intención',
    cualificando: 'Cualificando lead',
    respondiendo: 'Generando respuesta',
    notificando: 'Notificando al comercial',
  };

  function renderActividad() {
    const contenido = document.getElementById('contenido');
    contenido.innerHTML = `
      <h2>Actividad de los agentes</h2>
      <p style="color:var(--gris); font-size:0.9rem; margin-top:-0.5rem;">
        Qué está procesando el motor de IA ahora mismo, y el volumen de consultas gestionadas recientemente.
      </p>
      <div id="panel-actividad-agentes"><p>Cargando...</p></div>
    `;
    cargarActividadAgentes();
    intervaloActividad = setInterval(cargarActividadAgentes, 4000);
  }

  async function cargarActividadAgentes() {
    const datos = await api('/api/admin/actividad');
    const panel = document.getElementById('panel-actividad-agentes');
    if (!panel || !datos) return;

    const filasEnCurso = datos.enCurso.length
      ? datos.enCurso
          .map(
            (a) => `
            <tr>
              <td>${a.empresaNombre}</td>
              <td>${a.canal}</td>
              <td>${ETIQUETAS_ETAPA[a.etapa] ?? a.etapa}</td>
              <td>${a.segundos}s</td>
            </tr>`
          )
          .join('')
      : '<tr><td colspan="4" style="color:var(--gris);">Ningún agente procesando consultas ahora mismo.</td></tr>';

    panel.innerHTML = `
      <div class="filtros" style="margin-bottom:0.75rem;">
        <span class="badge badge-en_curso">En curso ahora: ${datos.enCurso.length}</span>
        <span class="badge badge-templado">Últimos 5 min: ${datos.ultimos5min}</span>
        <span class="badge badge-confirmado">Última hora: ${datos.ultimaHora}</span>
        <span class="badge badge-frio">Últimas 24h: ${datos.ultimas24h}</span>
      </div>
      <table>
        <thead><tr><th>Cliente</th><th>Canal</th><th>Etapa</th><th>Duración</th></tr></thead>
        <tbody>${filasEnCurso}</tbody>
      </table>
    `;
  }

  // --- Vista: Ficha de Gestión ---
  const CATEGORIAS_GESTION = [
    { valor: 'factura', etiqueta: 'Factura' },
    { valor: 'contrato', etiqueta: 'Contrato' },
    { valor: 'contrato_lopd', etiqueta: 'Contrato cesión datos personales' },
    { valor: 'otros', etiqueta: 'Otros' },
  ];
  const ETIQUETAS_CATEGORIA_GESTION = {
    factura: 'Factura',
    contrato: 'Contrato',
    contrato_lopd: 'Contrato cesión datos personales',
    otros: 'Otros',
  };

  function renderFichaGestion() {
    const contenido = document.getElementById('contenido');
    contenido.innerHTML = `
      <h2>Ficha de Gestión</h2>
      <p style="color:var(--gris); font-size:0.9rem; margin-top:-0.5rem;">
        Traza de documentos y notas de cada cliente: contratos, cesión de datos personales, facturas y cambios relevantes.
      </p>
      <div class="filtros">
        <input id="buscar-cliente-gestion" placeholder="Buscar por nombre o NIF..." style="max-width:400px;" />
        <button class="secundario" onclick="buscarClientesGestion()">Buscar</button>
      </div>
      <div id="resultados-busqueda-gestion"></div>
      <div id="cliente-fijado-gestion"></div>
    `;
    document.getElementById('buscar-cliente-gestion').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') buscarClientesGestion();
    });
  }

  async function buscarClientesGestion() {
    const q = document.getElementById('buscar-cliente-gestion').value.trim();
    const contenedor = document.getElementById('resultados-busqueda-gestion');
    contenedor.innerHTML = '';
    if (!q) return;

    const datos = await api(`/api/admin/empresas?q=${encodeURIComponent(q)}`);
    const tabla = document.createElement('table');
    tabla.innerHTML = '<thead><tr><th>Código</th><th>Nombre / Razón Social</th><th>NIF/CIF/NIE</th></tr></thead><tbody></tbody>';
    const cuerpo = tabla.querySelector('tbody');
    for (const e of datos) {
      const fila = document.createElement('tr');
      fila.className = 'fila-clic';
      fila.innerHTML = `<td>${e.codigo_cliente ?? '—'}</td><td>${e.nombre}</td><td>${e.nif_cif_nie ?? '—'}</td>`;
      fila.onclick = () => fijarClienteGestion(e);
      cuerpo.appendChild(fila);
    }
    contenedor.innerHTML = '';
    contenedor.appendChild(tabla);
  }

  function fijarClienteGestion(empresa) {
    document.getElementById('resultados-busqueda-gestion').innerHTML = '';
    document.getElementById('buscar-cliente-gestion').value = '';

    const contenedor = document.getElementById('cliente-fijado-gestion');
    contenedor.innerHTML = `
      <div class="panel-prompt" style="margin-top:1.5rem;">
        <h3>${empresa.nombre} <span style="font-size:0.8rem; color:var(--gris); font-family:monospace;">(${empresa.codigo_cliente ?? empresa.id})</span></h3>

        <h4>Añadir entrada</h4>
        <div class="form-grid">
          <div>
            <label for="gestion-categoria">Categoría</label>
            <select id="gestion-categoria">${CATEGORIAS_GESTION.map((c) => `<option value="${c.valor}">${c.etiqueta}</option>`).join('')}</select>
          </div>
          <div>
            <label for="gestion-titulo">Título</label>
            <input id="gestion-titulo" placeholder="Ej: Contrato firmado 2026" />
          </div>
        </div>
        <label for="gestion-descripcion" style="display:block; font-size:0.8rem; font-weight:600; margin:0.75rem 0 0.25rem; color:var(--gris);">Descripción / nota</label>
        <textarea id="gestion-descripcion" rows="3" placeholder="Detalles opcionales..."></textarea>
        <label for="gestion-archivo" style="display:block; font-size:0.8rem; font-weight:600; margin:0.5rem 0 0.25rem; color:var(--gris);">Documento adjunto (opcional)</label>
        <input type="file" id="gestion-archivo" />
        <button class="principal" style="margin-top:0.75rem;" onclick="anadirEntradaGestion('${empresa.id}')">Añadir entrada</button>
        <p id="mensaje-gestion" style="margin-top:0.5rem; font-size:0.9rem;"></p>

        <h4 style="margin-top:1.5rem;">Historial</h4>
        <div id="lista-entradas-gestion"><p>Cargando...</p></div>
      </div>
    `;
    cargarEntradasGestion(empresa.id);
  }

  async function cargarEntradasGestion(empresaId) {
    const datos = await api(`/api/admin/gestion/${empresaId}`);
    const contenedor = document.getElementById('lista-entradas-gestion');
    if (!datos.length) {
      contenedor.innerHTML = '<p style="color:var(--gris);">Sin entradas todavía.</p>';
      return;
    }
    contenedor.innerHTML = datos
      .map(
        (e) => `
        <div style="border-bottom:1px solid var(--borde); padding:0.75rem 0;">
          <div style="display:flex; justify-content:space-between; align-items:center; gap:0.5rem; flex-wrap:wrap;">
            <div>
              <span class="badge badge-${e.automatico ? 'frio' : 'confirmado'}">${ETIQUETAS_CATEGORIA_GESTION[e.categoria] ?? e.categoria}</span>

  async function anadirEntradaGestion(empresaId) {
    const categoria = document.getElementById('gestion-categoria').value;
    const titulo = document.getElementById('gestion-titulo').value.trim();
    const descripcion = document.getElementById('gestion-descripcion').value.trim();
    const archivo = document.getElementById('gestion-archivo').files[0];
    const mensaje = document.getElementById('mensaje-gestion');

    if (!titulo) { mensaje.textContent = 'El título es obligatorio'; return; }

    const formData = new FormData();
    formData.append('categoria', categoria);
    formData.append('titulo', titulo);
    if (descripcion) formData.append('descripcion', descripcion);
    if (archivo) formData.append('archivo', archivo);

    const res = await fetch(`/api/admin/gestion/${empresaId}`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}` },
      body: formData,
    });
    const resultado = await res.json();

    if (!res.ok) {
      mensaje.textContent = 'Error: ' + JSON.stringify(resultado.error ?? 'desconocido');
      return;
    }

    document.getElementById('gestion-titulo').value = '';
    document.getElementById('gestion-descripcion').value = '';
    document.getElementById('gestion-archivo').value = '';
    mensaje.textContent = '✅ Entrada añadida.';
    cargarEntradasGestion(empresaId);
  }

  // --- Verificación automática de IBAN + BIC/SWIFT (bancos españoles) ---
  const BANCOS_ES_BIC = {
    '0049': { nombre: 'Banco Santander', bic: 'BSCHESMM' },
    '0075': { nombre: 'Banco Popular (Santander)', bic: 'POPUESMM' },
    '0081': { nombre: 'Banco Sabadell', bic: 'BSABESBB' },
    '0128': { nombre: 'Bankinter', bic: 'BKBKESMM' },

    '2100': { nombre: 'CaixaBank', bic: 'CAIXESBB' },
    '2038': { nombre: 'Bankia (CaixaBank)', bic: 'CAHMESMM' },
    '2103': { nombre: 'Unicaja Banco', bic: 'UCJAES2M' },
    '2085': { nombre: 'Ibercaja', bic: 'CAZRES2Z' },
    '1465': { nombre: 'ING', bic: 'INGDESMM' },
    '1491': { nombre: 'Openbank', bic: 'OPENESMM' },
    '0073': { nombre: 'Openbank', bic: 'OPENESMM' },
  };

  // Validación estándar del dígito de control IBAN (mod 97 == 1).
  function ibanValido(iban) {
    const limpio = iban.replace(/\s+/g, '').toUpperCase();
    if (!/^[A-Z]{2}\d{2}[A-Z0-9]{10,30}$/.test(limpio)) return false;
    const reordenado = limpio.slice(4) + limpio.slice(0, 4);
    const numerico = reordenado.replace(/[A-Z]/g, (c) => (c.charCodeAt(0) - 55).toString());
    let resto = 0;
    for (let i = 0; i < numerico.length; i += 7) {
      resto = Number(String(resto) + numerico.substr(i, 7)) % 97;
    }
    return resto === 1;
  }

  function verificarIbanFicha() {
    const campo = document.getElementById('ficha-cuenta-facturacion');
    const resultado = document.getElementById('ficha-iban-verificacion');
    if (!campo || !resultado) return;

    const valor = campo.value.trim();
    if (!valor) { resultado.textContent = ''; return; }

    if (!ibanValido(valor)) {
      resultado.innerHTML = '<span style="color:#c0392b;">✗ IBAN no válido (revisa el dígito de control)</span>';
      return;
    }

    const limpio = valor.replace(/\s+/g, '').toUpperCase();
    if (limpio.startsWith('ES') && limpio.length === 24) {
      const entidad = limpio.slice(4, 8);
      const banco = BANCOS_ES_BIC[entidad];
      resultado.innerHTML = banco
        ? `<span style="color:#1a9f4d;">✓ IBAN válido — ${banco.nombre} — SWIFT/BIC: ${banco.bic}</span>`
        : `<span style="color:#1a9f4d;">✓ IBAN válido</span> <span style="color:var(--gris);">(entidad ${entidad} no está en el catálogo local; verifica el BIC manualmente)</span>`;
    } else {
      resultado.innerHTML = '<span style="color:#1a9f4d;">✓ IBAN válido</span>';
    }
  }

  async function crearEmpresa() {
    const nombre = document.getElementById('nueva-nombre').value.trim();
    const sector = document.getElementById('nueva-sector').value;
    const mensaje = document.getElementById('mensaje-nuevo-cliente');
    if (!nombre || !sector) { mensaje.textContent = 'Nombre y sector son obligatorios'; return; }

    const facturacionValor = document.getElementById('nueva-facturacion').value;

    const cuerpo = {
      nombre,
      sector,
      tono_comunicacion: document.getElementById('nueva-tono').value.trim(),
      idioma_principal: document.getElementById('nueva-idioma').value,
      emailNotificacion: document.getElementById('nueva-email').value.trim(),
      nif_cif_nie: document.getElementById('nueva-nif').value.trim(),
      tipo_via: document.getElementById('nueva-tipovia').value,
      nombre_via: document.getElementById('nueva-nombrevia').value.trim(),
      numero_via: document.getElementById('nueva-numero').value.trim(),
      piso: document.getElementById('nueva-piso').value.trim(),
      puerta: document.getElementById('nueva-puerta').value.trim(),
      codigo_postal: document.getElementById('nueva-cp').value.trim(),
      municipio: document.getElementById('nueva-municipio').value.trim(),
      provincia: document.getElementById('nueva-provincia').value.trim(),
      nombre_contacto: document.getElementById('nueva-contacto-nombre').value.trim(),
      rol_contacto: document.getElementById('nueva-contacto-rol').value,
      email_contacto: document.getElementById('nueva-contacto-email').value.trim(),
      telefono_contacto: document.getElementById('nueva-contacto-telefono').value.trim(),
      telefono_comunicacion: document.getElementById('nueva-telefono-comunicacion').value.trim(),
      facturacion_anual: facturacionValor ? Number(facturacionValor) : null,
    };

    const creada = await api('/api/admin/empresas', { method: 'POST', body: JSON.stringify(cuerpo) });
    if (!creada || creada.error) {
      mensaje.textContent = 'Error al crear la empresa: ' + JSON.stringify(creada?.error ?? 'desconocido');
      return;
    }
    renderNuevoCliente();
    document.getElementById('mensaje-nuevo-cliente').innerHTML =
      `✅ Empresa "${nombre}" creada correctamente. <strong>Código de cliente:</strong> <span style="font-family:monospace;">${creada.codigo_cliente ?? creada.id}</span>`;
  }

  function renderServicios() {
    const contenido = document.getElementById('contenido');
    contenido.innerHTML = `
      <h2>Servicios</h2>
      <div class="filtros">
        <input id="buscar-cliente" placeholder="Buscar por nombre, NIF/CIF o código de cliente..." style="max-width:400px;" />
        <button class="secundario" onclick="buscarClientesServicios()">Buscar</button>
      </div>
      <div id="resultados-busqueda-servicios"></div>
      <div id="cliente-fijado-servicios"></div>
    `;
    document.getElementById('buscar-cliente').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') buscarClientesServicios();
    });
  }

  async function buscarClientesServicios() {
    const q = document.getElementById('buscar-cliente').value.trim();
    const contenedor = document.getElementById('resultados-busqueda-servicios');
    contenedor.innerHTML = '';
    if (!q) return;

    const datos = await api(`/api/admin/empresas?q=${encodeURIComponent(q)}`);
    const tabla = document.createElement('table');
    tabla.innerHTML = `<thead><tr><th>Código</th><th>Nombre / Razón Social</th><th>NIF/CIF/NIE</th><th>Sector</th></tr></thead><tbody></tbody>`;
    const cuerpo = tabla.querySelector('tbody');
    for (const e of datos) {
      const fila = document.createElement('tr');
      fila.className = 'fila-clic';
      fila.innerHTML = `<td>${e.codigo_cliente ?? '—'}</td><td>${e.nombre}</td><td>${e.nif_cif_nie ?? '—'}</td><td>${e.sector}</td>`;
      fila.onclick = () => fijarClienteServicios(e);
      cuerpo.appendChild(fila);
    }
    contenedor.appendChild(tabla);
  }

  // --- Paquete contratado (comparativa dentro de Servicios) ---
  const SERVICIOS_PAQUETE = [
    { clave: 'formulario', etiqueta: 'Canal Formulario' },
    { clave: 'whatsapp', etiqueta: 'Canal WhatsApp' },
    { clave: 'multicanal', etiqueta: 'Multi-canal simultáneo' },
    { clave: 'catalogo_fotos', etiqueta: 'Catálogo de productos con fotos' },
    { clave: 'resumen_ia', etiqueta: 'Resumen de leads con IA' },
    { clave: 'historico_prompt', etiqueta: 'Histórico de versiones de prompt' },
    { clave: 'soporte_prioritario', etiqueta: 'Soporte prioritario' },
  ];

  function formatoEuros(valor) {
    if (valor === null || valor === undefined || valor === '') return '—';
    return Number(valor).toLocaleString('es-ES', { style: 'currency', currency: 'EUR', maximumFractionDigits: 2 });
  }

  function bloquePrecioPaquete(p) {
    if (p.metodo_facturacion === 'lead') {
      return `<div class="paquete-precio">${formatoEuros(p.precio_por_lead)}<small>por lead cualificado</small></div>`;
    }
    return `
      <div class="paquete-precio">${formatoEuros(p.coste_mensual)}<small>al mes · ${p.leads_incluidos_mes ?? 0} leads incluidos</small></div>
      <p style="font-size:0.78rem; color:var(--gris); margin:-0.4rem 0 0.4rem;">Lead adicional: ${formatoEuros(p.precio_lead_adicional)}</p>
    `;
  }

  function descripcionPrecioCorta(p) {
    return p.metodo_facturacion === 'lead'
      ? `${formatoEuros(p.precio_por_lead)}/lead`
      : `${formatoEuros(p.coste_mensual)}/mes`;
  }

  async function cargarPaqueteServicios(empresaId) {
    const contenedor = document.getElementById('paquete-comparativa-servicios');
    const [paquetes, asignado] = await Promise.all([
      api('/api/admin/paquetes'),
      api(`/api/admin/paquetes/asignado/${empresaId}`),
    ]);

    if (!paquetes.length) {
      contenedor.innerHTML = '<p style="color:var(--gris);">Todavía no hay paquetes configurados. Créalos en Producción → Productos.</p>';
      return;
    }

    const paqueteIdActual = asignado?.paqueteId ?? null;

    contenedor.innerHTML = `
      <div class="paquetes-comparativa">
        ${paquetes
          .map((p) => {
            const esActual = p.id === paqueteIdActual;
            const override = esActual ? (asignado?.override ?? {}) : {};
            const personalizado = esActual && Object.values(override).some((v) => v !== null && v !== undefined);
            const datosPrecio = esActual && asignado?.efectivo ? asignado.efectivo : p;
            const servicios = SERVICIOS_PAQUETE.map(
              (s) => `<li class="${p.servicios_incluidos?.[s.clave] ? '' : 'no-incluido'}">${p.servicios_incluidos?.[s.clave] ? '✓' : '✗'} ${s.etiqueta}</li>`
            ).join('');
            return `
              <div class="paquete-columna ${esActual ? 'seleccionado' : ''}">
                ${esActual ? '<span class="etiqueta-paquete-actual">Paquete actual</span>' : ''}
                ${personalizado ? '<span class="etiqueta-paquete-actual" style="background:var(--ciruela);">Precio personalizado</span>' : ''}
                <h4>${p.nombre}</h4>
                <p style="font-size:0.82rem; color:var(--gris); margin:0;">${p.descripcion ?? ''}</p>
                ${bloquePrecioPaquete(datosPrecio)}
                ${personalizado ? `<p style="font-size:0.75rem; color:var(--gris); margin:0 0 0.4rem;">Precio general del paquete: ${descripcionPrecioCorta(p)}</p>` : ''}
                <p style="font-size:0.78rem; color:var(--gris); margin:0;">Implementación: ${formatoEuros(datosPrecio.coste_implementacion)}</p>
                <ul class="paquete-servicios">${servicios}</ul>
                ${esActual
                  ? `<button class="secundario" onclick='mostrarOverridePaquete("${empresaId}", ${JSON.stringify(p).replace(/'/g, '&apos;')}, ${JSON.stringify(override).replace(/'/g, '&apos;')})'>Personalizar precios para este cliente</button>`
                  : `<button class="principal" onclick="asignarPaqueteServicios('${empresaId}', '${p.id}')">Seleccionar este paquete</button>`}
              </div>
            `;
          })
          .join('')}
      </div>
      <div id="override-paquete-contenedor"></div>
      <p id="mensaje-paquete-servicios" style="margin-top:0.5rem; font-size:0.9rem;"></p>
    `;
  }

  async function asignarPaqueteServicios(empresaId, paqueteId) {
    await api(`/api/admin/paquetes/asignado/${empresaId}`, {
      method: 'PUT',
      body: JSON.stringify({ paqueteId, override: {} }),
    });
    cargarPaqueteServicios(empresaId);
  }

  function mostrarOverridePaquete(empresaId, paquete, override) {
    const CAMPOS = paquete.metodo_facturacion === 'lead'
      ? [{ clave: 'precio_por_lead', etiqueta: 'Precio por lead (€)' }]
      : [
          { clave: 'coste_mensual', etiqueta: 'Coste mensual (€)' },
          { clave: 'leads_incluidos_mes', etiqueta: 'Leads incluidos/mes' },
          { clave: 'precio_lead_adicional', etiqueta: 'Precio lead adicional (€)' },
        ];
    CAMPOS.unshift({ clave: 'coste_implementacion', etiqueta: 'Coste de implementación (€)' });

    const contenedor = document.getElementById('override-paquete-contenedor');
    contenedor.innerHTML = `
      <div class="panel-prompt" style="margin-top:1rem;">
        <h4 style="margin-top:0;">Precios personalizados para este cliente</h4>
        <p style="font-size:0.8rem; color:var(--gris); margin-top:-0.5rem;">Deja un campo vacío para usar el valor general del paquete "${paquete.nombre}".</p>
        <div class="form-grid">
          ${CAMPOS.map(
            (c) => `<div><label>${c.etiqueta}</label><input id="override-${c.clave}" type="number" step="0.01" value="${override[c.clave] ?? ''}" placeholder="${paquete[c.clave] ?? ''}" /></div>`
          ).join('')}
        </div>
        <button class="principal" style="margin-top:0.75rem;" onclick='guardarOverridePaquete("${empresaId}", "${paquete.id}", ${JSON.stringify(CAMPOS.map((c) => c.clave))})'>Guardar precios personalizados</button>
      </div>
    `;
  }

  async function guardarOverridePaquete(empresaId, paqueteId, claves) {
    const override = {};
    for (const clave of claves) {
      const valor = document.getElementById(`override-${clave}`).value;
      override[clave] = valor === '' ? null : Number(valor);
    }
    await api(`/api/admin/paquetes/asignado/${empresaId}`, {
      method: 'PUT',
      body: JSON.stringify({ paqueteId, override }),
    });
    document.getElementById('mensaje-paquete-servicios').textContent = '✅ Precios personalizados guardados.';
    cargarPaqueteServicios(empresaId);
  }

  async function cargarPromptServicios(empresaId) {
    const versiones = await api(`/api/admin/prompts/${empresaId}`);
    const activa = versiones.find((v) => v.activo);
    document.getElementById('servicios-prompt-contenido').value = activa?.contenido ?? '';
    document.getElementById('servicios-prompt-version').textContent = activa ? `v${activa.version}` : 'sin prompt todavía';
  }

  async function guardarPromptServicios(empresaId) {
    const contenido = document.getElementById('servicios-prompt-contenido').value.trim();
    const mensaje = document.getElementById('mensaje-prompt-servicios');
    if (!contenido) { mensaje.textContent = 'El prompt no puede estar vacío'; return; }

    const guardado = await api(`/api/admin/prompts/${empresaId}/directo`, { method: 'POST', body: JSON.stringify({ contenido }) });
    mensaje.textContent = `Guardado y activo — v${guardado.version}.`;
    cargarPromptServicios(empresaId);

  async function cargarDocumentosServicios(empresaId) {
    const documentos = await api(`/api/admin/documentos/${empresaId}`);
    const vistos = new Set();
    const ultimos = documentos.filter((d) => {
      if (vistos.has(d.tipo)) return false;
      vistos.add(d.tipo);
      return true;
    });

    const contenedor = document.getElementById('lista-documentos-servicios');
    contenedor.innerHTML = ultimos.length
      ? ultimos.map((d) => `
          <div style="border:1px solid var(--borde); border-radius:6px; padding:0.6rem 0.8rem; margin-bottom:0.5rem; font-size:0.85rem;">
            <strong>${d.tipo}</strong> <span style="color:var(--gris);">(v${d.version})</span>
            <button class="secundario" style="float:right; padding:0.2rem 0.6rem;" onclick="borrarDocumentoServicios('${d.id}', '${empresaId}')">Eliminar</button>
            <div style="white-space:pre-wrap; margin-top:0.4rem; max-height:100px; overflow:auto; color:#555;">${d.contenido}</div>
          </div>
        `).join('')
      : '<p style="font-size:0.85rem; color:var(--gris);">Sin documentos todavía.</p>';
  }

  function leerArchivoComoTexto(archivo) {
    return new Promise((resolve, reject) => {
      const lector = new FileReader();
      lector.onload = () => resolve(String(lector.result));
      lector.onerror = () => reject(lector.error);
      lector.readAsText(archivo, 'UTF-8');
    });
  }

  async function anadirDocumentoServicios(empresaId) {
    const tipo = document.getElementById('doc-tipo').value;
    const inputArchivo = document.getElementById('doc-archivo');
    const mensaje = document.getElementById('mensaje-documentos-servicios');
    const archivo = inputArchivo.files[0];

    if (!archivo) { mensaje.textContent = 'Selecciona un archivo primero'; return; }

    let contenido;
    try {
      contenido = (await leerArchivoComoTexto(archivo)).trim();
    } catch (e) {
      mensaje.textContent = 'No se pudo leer el archivo';
      return;
    }
    if (!contenido) { mensaje.textContent = 'El archivo está vacío'; return; }

    await api(`/api/admin/documentos/${empresaId}`, { method: 'POST', body: JSON.stringify({ tipo, contenido }) });
    inputArchivo.value = '';
    document.getElementById('doc-archivo-preview').textContent = '';
    mensaje.textContent = `Documento "${archivo.name}" añadido y activo para las próximas consultas.`;
    cargarDocumentosServicios(empresaId);
  }

    await api(`/api/admin/documentos/${id}`, { method: 'DELETE' });
    cargarDocumentosServicios(empresaId);

  async function subirCatalogoConFotos(empresaId) {
    const input = document.getElementById('catalogo-archivo');
    const mensaje = document.getElementById('mensaje-catalogo-servicios');
    const archivo = input.files[0];
    if (!archivo) { mensaje.textContent = 'Selecciona un archivo PDF o Word primero'; return; }

    mensaje.textContent = 'Subiendo y extrayendo (puede tardar unos segundos)...';
    const formData = new FormData();
    formData.append('archivo', archivo);

    const res = await fetch(`/api/admin/documentos/${empresaId}/extraer`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}` }, // sin Content-Type: el navegador pone el boundary de multipart
      body: formData,
    });
    const datos = await res.json();

    if (!res.ok) {
      mensaje.textContent = 'Error: ' + (datos.error || 'no se pudo procesar el archivo');
      return;
    }

    mensaje.textContent = `Listo: texto extraído y ${datos.imagenes.length} imagen(es) añadidas para etiquetar.`;
    input.value = '';
    cargarDocumentosServicios(empresaId);
    cargarImagenesCatalogo(empresaId);
  }

  async function descargarExtraccion() {
    const empresaId = document.getElementById('extraccion-empresa').value;
    const desde = document.getElementById('extraccion-desde').value;
    const hasta = document.getElementById('extraccion-hasta').value;
    const params = new URLSearchParams({ formato: 'csv' });
    if (empresaId) params.set('empresaId', empresaId);
    if (desde) params.set('desde', desde);
    if (hasta) params.set('hasta', hasta);

    // Descarga autenticada: un <a href> normal no puede llevar la cabecera
    // Authorization, así que pedimos el CSV vía fetch y lo convertimos en
    // un archivo local para descargarlo.
    const res = await fetch(`/api/admin/extracciones/leads?${params.toString()}`, {
      headers: { Authorization: `Bearer ${token}` },
    });
    const blob = await res.blob();
    const enlace = document.createElement('a');
    enlace.href = URL.createObjectURL(blob);
    enlace.download = 'leads-leadsift.csv';
    enlace.click();
  }

            <input id="paquete-nombre" placeholder="Básico / Profesional / Premium" value="${paquete?.nombre ?? ''}" />
          </div>
          <div>
            <label for="paquete-orden">Orden (columna, de izq. a der.)</label>
            <input id="paquete-orden" type="number" value="${paquete?.orden ?? 0}" />
          </div>
        </div>
        <label for="paquete-descripcion" style="display:block; font-size:0.8rem; font-weight:600; margin:0.75rem 0 0.25rem; color:var(--gris);">Descripción breve</label>
        <input id="paquete-descripcion" value="${paquete?.descripcion ?? ''}" placeholder="Para quién es este paquete" />

        <h4 style="margin-top:1.25rem;">Coste e implementación</h4>
        <div class="form-grid">
          <div>
            <label for="paquete-implementacion">Coste de implementación y conexión (€)</label>
            <input id="paquete-implementacion" type="number" step="0.01" min="0" value="${paquete?.coste_implementacion ?? 0}" />
          </div>
          <div>
            <label for="paquete-metodo">Método de facturación</label>
            <select id="paquete-metodo" onchange="actualizarCamposFacturacionPaquete()">
              <option value="suscripcion" ${metodo === 'suscripcion' ? 'selected' : ''}>Suscripción mensual</option>
              <option value="lead" ${metodo === 'lead' ? 'selected' : ''}>Precio por lead</option>
            </select>
          </div>
        </div>

        <div id="campos-facturacion-lead" class="form-grid" style="${metodo === 'lead' ? '' : 'display:none;'}">
          <div>
            <label for="paquete-precio-lead">Precio por lead (€)</label>
            <input id="paquete-precio-lead" type="number" step="0.01" min="0" value="${paquete?.precio_por_lead ?? ''}" />
          </div>
        </div>

        <div id="campos-facturacion-suscripcion" class="form-grid" style="${metodo === 'suscripcion' ? '' : 'display:none;'}">
          <div>
            <label for="paquete-leads-incluidos">Leads incluidos al mes</label>
            <input id="paquete-leads-incluidos" type="number" min="0" value="${paquete?.leads_incluidos_mes ?? ''}" />
          </div>
          <div>
            <label for="paquete-coste-mensual">Coste mensual (€)</label>
            <input id="paquete-coste-mensual" type="number" step="0.01" min="0" value="${paquete?.coste_mensual ?? ''}" />
          </div>
          <div>
            <label for="paquete-lead-adicional">Precio por lead adicional (€)</label>
            <input id="paquete-lead-adicional" type="number" step="0.01" min="0" value="${paquete?.precio_lead_adicional ?? ''}" />
          </div>
        </div>

        <h4 style="margin-top:1.25rem;">Servicios incluidos</h4>
        <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:0.4rem;">
          ${SERVICIOS_PAQUETE.map(
            (s) => `<label style="display:flex; align-items:center; gap:0.4rem; font-weight:normal; font-size:0.88rem;">
              <input type="checkbox" id="servicio-${s.clave}" style="width:auto;" ${servicios[s.clave] ? 'checked' : ''} /> ${s.etiqueta}
            </label>`
          ).join('')}
        </div>

        <div style="margin-top:1.25rem; display:flex; gap:0.5rem; align-items:center;">
          <button class="principal" onclick="guardarPaquete(${esNuevo ? 'null' : `'${paquete.id}'`})">Guardar</button>
          <button class="secundario" onclick="document.getElementById('panel-paquete').innerHTML=''">Cancelar</button>
        </div>
        <p id="mensaje-paquete" style="margin-top:0.5rem; font-size:0.9rem;"></p>
      </div>
    `;
  }

  function actualizarCamposFacturacionPaquete() {
    const metodo = document.getElementById('paquete-metodo').value;
    document.getElementById('campos-facturacion-lead').style.display = metodo === 'lead' ? '' : 'none';
    document.getElementById('campos-facturacion-suscripcion').style.display = metodo === 'suscripcion' ? '' : 'none';
  }

  async function guardarPaquete(paqueteId) {
    const metodo = document.getElementById('paquete-metodo').value;
    const mensaje = document.getElementById('mensaje-paquete');
    const nombre = document.getElementById('paquete-nombre').value.trim();
    if (!nombre) { mensaje.textContent = 'El nombre es obligatorio'; return; }

    const servicios_incluidos = {};
    for (const s of SERVICIOS_PAQUETE) {
      servicios_incluidos[s.clave] = document.getElementById(`servicio-${s.clave}`).checked;
    }

    const numOrNull = (id) => {
      const v = document.getElementById(id)?.value;
      return v === '' || v === undefined ? null : Number(v);
    };

    const cuerpo = {
      nombre,
      descripcion: document.getElementById('paquete-descripcion').value.trim(),
      orden: Number(document.getElementById('paquete-orden').value) || 0,
      coste_implementacion: Number(document.getElementById('paquete-implementacion').value) || 0,
      metodo_facturacion: metodo,
      precio_por_lead: metodo === 'lead' ? numOrNull('paquete-precio-lead') : null,
      leads_incluidos_mes: metodo === 'suscripcion' ? numOrNull('paquete-leads-incluidos') : null,
      coste_mensual: metodo === 'suscripcion' ? numOrNull('paquete-coste-mensual') : null,
      precio_lead_adicional: metodo === 'suscripcion' ? numOrNull('paquete-lead-adicional') : null,
      servicios_incluidos,
    };

    const resultado = paqueteId
      ? await api(`/api/admin/paquetes/${paqueteId}`, { method: 'PUT', body: JSON.stringify(cuerpo) })
      : await api('/api/admin/paquetes', { method: 'POST', body: JSON.stringify(cuerpo) });

    if (!resultado || resultado.error) {
      mensaje.textContent = 'Error: ' + JSON.stringify(resultado?.error ?? 'desconocido');
      return;
    }

    await cargarPaquetes();
    document.getElementById('panel-paquete').innerHTML = '';
  }

  async function eliminarPaquete(paqueteId, nombre) {
    if (!confirm(`¿Eliminar el paquete "${nombre}"? Los clientes que ya lo tengan asignado mantienen sus precios.`)) return;
    await api(`/api/admin/paquetes/${paqueteId}`, { method: 'DELETE' });
    cargarPaquetes();
  }

  // --- Vista: Facturación ---
  function mesActual() {
    const hoy = new Date();
    return { anio: hoy.getFullYear(), mes: hoy.getMonth() + 1 };
  }

  const NOMBRES_MES = [
    'Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio',
    'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre',
  ];

  async function renderFacturacion() {
    const { anio, mes } = mesActual();
    const contenido = document.getElementById('contenido');
    contenido.innerHTML = `
      <h2>Facturación</h2>
      <p style="color:var(--gris); font-size:0.9rem; margin-top:-0.5rem;">
        Recibos mensuales generados automáticamente a partir del paquete asignado a cada cliente y su recuento real de leads.
        La conexión con el banco para el cobro se configurará más adelante.
      </p>
      <div class="filtros">
        <select id="filtro-factura-mes">
          ${NOMBRES_MES.map((n, i) => `<option value="${i + 1}" ${i + 1 === mes ? 'selected' : ''}>${n}</option>`).join('')}
        </select>
        <input id="filtro-factura-anio" type="number" value="${anio}" style="max-width:100px;" />
        <button class="secundario" onclick="cargarRecibos()">Ver mes</button>
        <button class="principal" onclick="generarRecibosMes()">Generar recibos de este mes</button>
      </div>
      <p id="mensaje-facturacion" style="font-size:0.9rem;"></p>
      <table id="tabla-recibos">
        <thead>
          <tr>
            <th>Nº Factura</th><th>Cliente</th><th>Paquete</th><th>Método</th><th>Leads contados</th>
            <th>Incluidos</th><th>Exceso</th><th>Implementación</th><th>Total</th><th>Estado</th><th>Acciones</th>
          </tr>
        </thead>
        <tbody></tbody>
        <tfoot></tfoot>
      </table>
    `;
    cargarRecibos();
  }

  async function cargarRecibos() {
    const anio = Number(document.getElementById('filtro-factura-anio').value);
    const mes = Number(document.getElementById('filtro-factura-mes').value);
    const datos = await api(`/api/admin/facturacion?anio=${anio}&mes=${mes}`);
    const cuerpo = document.querySelector('#tabla-recibos tbody');
    const pie = document.querySelector('#tabla-recibos tfoot');
    cuerpo.innerHTML = '';
    pie.innerHTML = '';

    if (!datos.length) {
      cuerpo.innerHTML = '<tr><td colspan="11" style="color:var(--gris);">Sin recibos generados para este mes todavía.</td></tr>';
      return;
    }

    let total = 0;
    for (const r of datos) {
      total += Number(r.total);
      const fila = document.createElement('tr');
      const estado = r.enviado_en ? 'Enviada' : r.emitido_en ? 'Emitida' : 'Sin emitir';
      fila.innerHTML = `
        <td style="font-family:monospace;">${r.numero_factura ?? '—'}</td>
        <td>${r.empresas?.nombre ?? '—'} <span style="font-family:monospace; font-size:0.75rem; color:var(--gris);">(${r.empresas?.codigo_cliente ?? '—'})</span></td>
        <td>${r.paquete_nombre ?? '—'}</td>
        <td>${r.metodo_facturacion === 'lead' ? 'Por lead' : 'Suscripción'}</td>
        <td>${r.leads_contados}</td>
        <td>${r.leads_incluidos_mes ?? '—'}</td>
        <td>${r.leads_exceso}</td>
        <td>${r.incluye_implementacion ? formatoEuros(r.coste_implementacion) : '—'}</td>
        <td><strong>${formatoEuros(r.total)}</strong></td>
        <td><span class="badge badge-${r.enviado_en ? 'confirmado' : r.emitido_en ? 'templado' : 'desestimado'}">${estado}</span></td>
        <td>
          <button class="secundario" onclick="emitirFactura('${r.id}')">${r.emitido_en ? 'Re-emitir' : 'Emitir'}</button>
          ${r.emitido_en ? `<button class="secundario" onclick="verFacturaPdf('${r.id}')">Ver PDF</button>` : ''}
          ${r.emitido_en ? `<button class="secundario" onclick="enviarFactura('${r.id}')">${r.enviado_en ? 'Reenviar' : 'Enviar'} por email</button>` : ''}
        </td>
      `;
      cuerpo.appendChild(fila);
    }
    pie.innerHTML = `<tr><td colspan="8"></td><td colspan="3"><strong>Total: ${formatoEuros(total)}</strong></td></tr>`;
  }

  async function emitirFactura(reciboId) {
    const mensaje = document.getElementById('mensaje-facturacion');
    mensaje.textContent = 'Generando PDF...';
    const resultado = await api(`/api/admin/facturacion/${reciboId}/emitir`, { method: 'POST' });
    if (resultado?.error) {
      mensaje.textContent = 'Error: ' + JSON.stringify(resultado.error);
      return;
    }
    mensaje.textContent = `✅ Factura ${resultado.numero_factura} emitida y guardada en el repositorio del cliente.`;
    cargarRecibos();
  }

  async function verFacturaPdf(reciboId) {
    const resultado = await api(`/api/admin/facturacion/${reciboId}/pdf`);
    if (resultado?.error) {
      alert(resultado.error);
      return;
    }
    window.open(resultado.url, '_blank');
  }

  async function enviarFactura(reciboId) {
    const mensaje = document.getElementById('mensaje-facturacion');
    mensaje.textContent = 'Enviando factura por email...';
    const resultado = await api(`/api/admin/facturacion/${reciboId}/enviar`, { method: 'POST' });
    if (resultado?.error) {
      mensaje.textContent = 'Error: ' + JSON.stringify(resultado.error);
      return;
    }
    mensaje.textContent = '✅ Factura enviada por email correctamente.';
    cargarRecibos();
  }

  async function generarRecibosMes() {
    const anio = Number(document.getElementById('filtro-factura-anio').value);
    const mes = Number(document.getElementById('filtro-factura-mes').value);
    const mensaje = document.getElementById('mensaje-facturacion');
    mensaje.textContent = 'Generando recibos...';
    const resultado = await api('/api/admin/facturacion/generar', { method: 'POST', body: JSON.stringify({ anio, mes }) });
    if (resultado?.error) {
      mensaje.textContent = 'Error: ' + JSON.stringify(resultado.error);
      return;
    }
    mensaje.textContent = `✅ ${resultado.length} recibo(s) generado(s) para ${NOMBRES_MES[mes - 1]} ${anio}.`;
    cargarRecibos();
  }

  // --- Vista: Usuarios / Roles ---
  const ETIQUETAS_ROL = {
    owner: 'Propietario (interno)',
    admin: 'Administrador (interno)',
    soporte: 'Soporte (interno)',
    client_user: 'Cliente (externo)',
  };
  const ROLES_USUARIO = ['owner', 'admin', 'soporte', 'client_user'];

  async function renderUsuarios() {
    const contenido = document.getElementById('contenido');
    contenido.innerHTML = `
      <h2>Usuarios / Roles</h2>
      <button class="principal" onclick="abrirFormularioUsuario(null)">+ Nuevo usuario</button>
      <table id="tabla-usuarios" style="margin-top:1rem;">
        <thead><tr><th>Email</th><th>Nombre</th><th>NIF</th><th>Rol</th><th>Empresa (si es cliente)</th><th>Acciones</th></tr></thead>
        <tbody></tbody>
      </table>
      <div id="panel-usuario"></div>
    `;
    cargarUsuarios();
  }

  let usuariosCache = [];

  async function cargarUsuarios() {
    const datos = await api('/api/admin/usuarios');
    usuariosCache = datos;
    const cuerpo = document.querySelector('#tabla-usuarios tbody');
    cuerpo.innerHTML = '';
    for (const u of datos) {
      const fila = document.createElement('tr');
      fila.innerHTML = `
        <td>${u.email ?? '—'}</td>
        <td>${u.nombre ?? '—'}</td>
        <td>${u.nif ?? '—'}</td>
        <td>${ETIQUETAS_ROL[u.rol] ?? u.rol}</td>
        <td>${u.empresaNombre ?? '—'}</td>
        <td>
          <button class="secundario" onclick='abrirFormularioUsuario(${JSON.stringify(u).replace(/'/g, "&apos;")})'>Editar</button>
          <button class="secundario" onclick="eliminarUsuario('${u.id}', '${(u.email ?? '').replace(/'/g, "\\'")}')">Eliminar</button>
        </td>
      `;
      cuerpo.appendChild(fila);
    }
  }

  async function abrirFormularioUsuario(usuario) {
    const panel = document.getElementById('panel-usuario');
    const empresas = await api('/api/admin/empresas');
    const opcionesEmpresa = empresas
      .map((e) => `<option value="${e.id}" ${usuario?.empresa_id === e.id ? 'selected' : ''}>${e.nombre}</option>`)
      .join('');
    const esNuevo = !usuario;

    panel.innerHTML = `
      <div class="panel-prompt" style="margin-top:1.5rem; max-width:600px;">
        <h3>${esNuevo ? 'Nuevo usuario' : `Editar usuario — ${usuario.email}`}</h3>
        <div class="form-grid">
          ${esNuevo ? `
          <div>
            <label for="usuario-email">Email</label>
            <input id="usuario-email" type="email" placeholder="persona@ejemplo.com" />
          </div>
          <div>
            <label for="usuario-password">Contraseña inicial</label>
            <input id="usuario-password" type="password" placeholder="Mínimo 8 caracteres" />
          </div>` : ''}
          <div>
            <label for="usuario-nombre">Nombre</label>
            <input id="usuario-nombre" value="${usuario?.nombre ?? ''}" />
          </div>
          <div>
            <label for="usuario-nif">NIF</label>
            <input id="usuario-nif" value="${usuario?.nif ?? ''}" placeholder="12345678A" />
          </div>
          <div>
            <label for="usuario-rol">Rol</label>
            <select id="usuario-rol" onchange="actualizarVisibilidadEmpresaUsuario()">
              ${ROLES_USUARIO.map((r) => `<option value="${r}" ${usuario?.rol === r ? 'selected' : ''}>${ETIQUETAS_ROL[r]}</option>`).join('')}
            </select>
          </div>
          <div id="usuario-empresa-contenedor" style="${(usuario?.rol ?? 'owner') === 'client_user' ? '' : 'display:none;'}">
            <label for="usuario-empresa">Empresa (si es cliente externo)</label>
            <select id="usuario-empresa"><option value="">—</option>${opcionesEmpresa}</select>
          </div>
        </div>
        <div style="margin-top:1rem; display:flex; gap:0.5rem; align-items:center; flex-wrap:wrap;">
          <button class="principal" onclick="guardarUsuario(${esNuevo ? 'null' : `'${usuario.id}'`})">Guardar</button>
          ${!esNuevo ? `<button class="secundario" onclick="mostrarCambioPassword('${usuario.id}')">Cambiar contraseña</button>` : ''}
          <button class="secundario" onclick="document.getElementById('panel-usuario').innerHTML=''">Cancelar</button>
        </div>
        <div id="usuario-password-contenedor"></div>
        <p id="mensaje-usuario" style="margin-top:0.5rem; font-size:0.9rem;"></p>
      </div>
    `;
  }

  function actualizarVisibilidadEmpresaUsuario() {
    const rol = document.getElementById('usuario-rol').value;
    document.getElementById('usuario-empresa-contenedor').style.display = rol === 'client_user' ? '' : 'none';
  }

  async function guardarUsuario(usuarioId) {
    const rol = document.getElementById('usuario-rol').value;
    const nombre = document.getElementById('usuario-nombre').value.trim();
    const nif = document.getElementById('usuario-nif').value.trim();
    const empresaId = rol === 'client_user' ? (document.getElementById('usuario-empresa').value || null) : null;
    const mensaje = document.getElementById('mensaje-usuario');

    if (rol === 'client_user' && !empresaId) {
      mensaje.textContent = 'Un usuario externo (cliente) requiere una empresa asignada';
      return;
    }

    let resultado;
    if (!usuarioId) {
      const email = document.getElementById('usuario-email').value.trim();
      const password = document.getElementById('usuario-password').value;
      if (!email || !password || password.length < 8) {
        mensaje.textContent = 'Email y contraseña (mínimo 8 caracteres) son obligatorios';
        return;
      }
      resultado = await api('/api/admin/usuarios', {
        method: 'POST',
        body: JSON.stringify({ email, password, rol, nombre, nif, empresaId }),
      });
    } else {
      resultado = await api(`/api/admin/usuarios/${usuarioId}`, {
        method: 'PUT',
        body: JSON.stringify({ rol, nombre, nif, empresaId }),
      });
    }

    if (!resultado || resultado.error) {
      mensaje.textContent = 'Error: ' + JSON.stringify(resultado?.error ?? 'desconocido');
      return;
    }

    await cargarUsuarios();
    document.getElementById('panel-usuario').innerHTML = '';
  }

  function mostrarCambioPassword(usuarioId) {
    const contenedor = document.getElementById('usuario-password-contenedor');
    contenedor.innerHTML = `
      <div style="margin-top:1rem; padding-top:1rem; border-top:1px solid var(--borde);">
        <label for="nueva-password-usuario">Nueva contraseña</label>
        <input id="nueva-password-usuario" type="password" placeholder="Mínimo 8 caracteres" style="max-width:300px;" />
        <button class="secundario" style="margin-top:0.5rem;" onclick="guardarNuevaPassword('${usuarioId}')">Guardar contraseña</button>
      </div>
    `;
  }

  async function guardarNuevaPassword(usuarioId) {
    const password = document.getElementById('nueva-password-usuario').value;
    const mensaje = document.getElementById('mensaje-usuario');
    if (!password || password.length < 8) {
      mensaje.textContent = 'La contraseña debe tener al menos 8 caracteres';
      return;
    }
    const resultado = await api(`/api/admin/usuarios/${usuarioId}/password`, {
      method: 'PUT',
      body: JSON.stringify({ password }),
    });
    if (!resultado || resultado.error) {
      mensaje.textContent = 'Error: ' + JSON.stringify(resultado?.error ?? 'desconocido');
      return;
    }
    document.getElementById('usuario-password-contenedor').innerHTML = '';
    mensaje.textContent = '✅ Contraseña actualizada correctamente.';
  }

  async function eliminarUsuario(usuarioId, email) {
    if (!confirm(`¿Eliminar definitivamente el usuario ${email}? Esta acción no se puede deshacer.`)) return;
    const resultado = await api(`/api/admin/usuarios/${usuarioId}`, { method: 'DELETE' });
    if (resultado?.error) {
      alert('Error: ' + resultado.error);
      return;
    }
    cargarUsuarios();
  }

  // --- Arranque ---
  const vistaInicial = window.location.hash.replace('#', '') || 'dashboard';
  irA(vistas[vistaInicial] ? vistaInicial : 'dashboard');
</script>
</body>
</html>
